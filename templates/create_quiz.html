{{define "content"}}

<section class="quiz-section">
    <div class="quiz-shell">
        <a href="/quizzes" class="back-link">← Back to Quizzes</a>

        <div class="quiz-intro-card">
            <span class="tag">Quiz builder</span>
            <h1 class="quiz-title">Create a Quiz</h1>
            <p class="quiz-meta">Add multiple choice or true/false questions for your students.</p>
        </div>

        {{if .Message}}
        <div class="alert">{{.Message}}</div>
        {{end}}

        <form action="/quiz/create" method="POST" id="quiz-form" class="quiz-create-form">
            <div class="form-grid">
                <label class="field-group">
                    <span>Quiz title *</span>
                    <input type="text" name="title" placeholder="e.g. Data Structures Basics" required>
                </label>

                <label class="field-group">
                    <span>Course / Subject *</span>
                    <input type="text" name="course" placeholder="e.g. Computer Science" required>
                </label>

                <label class="field-group">
                    <span>University *</span>
                    <input type="text" name="university" list="uni-suggestions" placeholder="Type your university name..." required>
                    <datalist id="uni-suggestions">
                        {{range .Universities}}
                        <option value="{{.}}">
                        {{end}}
                    </datalist>
                </label>

                <label class="field-group full-width">
                    <span>Description</span>
                    <textarea name="description" rows="3" placeholder="Briefly describe what this quiz covers..."></textarea>
                </label>
            </div>

            <div class="section-card">
                <div class="section-toolbar">
                    <div>
                        <h2 class="section-title">Questions</h2>
                        <p class="section-copy">Add one or more questions, then choose the correct answer for each.</p>
                    </div>
                </div>

                <div id="questions-container" class="questions-stack">
                    <!-- Question blocks get added here by JavaScript -->
                </div>

                <button type="button" id="add-question-btn" class="secondary-btn">+ Add Question</button>
            </div>

            <div class="form-actions">
                <button type="submit" class="submit-btn">📤 Create Quiz</button>
            </div>
        </form>
    </div>
</section>

<!--
    This is plain template HTML — we clone it with JavaScript every
    time "+ Add Question" is clicked. Using <template> means this
    markup is parsed by the browser but never rendered on its own.
-->
<template id="question-template">
    <div class="question-builder question-block">
        <div class="question-builder-header">
            <p class="question-number">Question</p>
            <button type="button" class="remove-question-btn">✕ Remove</button>
        </div>

        <label class="field-group">
            <span>Question text *</span>
            <input type="text" name="question_text[]" placeholder="e.g. What is the time complexity of binary search?" required>
        </label>

        <div class="question-grid">
            <label class="field-group">
                <span>Question type *</span>
                <select name="question_type[]" class="question-type-select" required>
                    <option value="mcq">Multiple Choice</option>
                    <option value="true_false">True / False</option>
                </select>
            </label>

            <label class="field-group">
                <span>Correct answer *</span>
                <select name="correct_answer[]" class="correct-answer-select" required>
                    <option value="a">A</option>
                    <option value="b">B</option>
                    <option value="c">C</option>
                    <option value="d">D</option>
                </select>
            </label>
        </div>

        <div class="mcq-options">
            <label class="field-group">
                <span>Option A</span>
                <input type="text" name="option_a[]" placeholder="Option A">
            </label>
            <label class="field-group">
                <span>Option B</span>
                <input type="text" name="option_b[]" placeholder="Option B">
            </label>
            <label class="field-group">
                <span>Option C (optional)</span>
                <input type="text" name="option_c[]" placeholder="Option C">
            </label>
            <label class="field-group">
                <span>Option D (optional)</span>
                <input type="text" name="option_d[]" placeholder="Option D">
            </label>
        </div>
    </div>
</template>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const container = document.getElementById('questions-container');
    const template = document.getElementById('question-template');
    const addBtn = document.getElementById('add-question-btn');

    function addQuestion() {
        const clone = template.content.cloneNode(true);
        const block = clone.querySelector('.question-block');

        // When question type changes between MCQ and True/False,
        // swap the correct-answer dropdown options and hide/show
        // the option A-D fields accordingly.
        const typeSelect = block.querySelector('.question-type-select');
        const correctSelect = block.querySelector('.correct-answer-select');
        const mcqOptions = block.querySelector('.mcq-options');

        typeSelect.addEventListener('change', function () {
            if (this.value === 'true_false') {
                mcqOptions.style.display = 'none';
                correctSelect.innerHTML = '<option value="true">True</option><option value="false">False</option>';
                correctSelect.name = 'correct_answer[]';
            } else {
                mcqOptions.style.display = 'block';
                correctSelect.innerHTML = '<option value="a">A</option><option value="b">B</option><option value="c">C</option><option value="d">D</option>';
            }
        });

        block.querySelector('.remove-question-btn').addEventListener('click', function () {
            block.remove();
        });

        container.appendChild(clone);
    }

    addBtn.addEventListener('click', addQuestion);

    // Start with one question block visible so the form isn't empty
    addQuestion();
});
</script>

{{end}}
