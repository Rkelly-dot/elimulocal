{{define "content"}}

<section class="upload-section">
    <a href="/browse" class="back-link">← Back to Browse</a>
    <h1>Share a Resource</h1>
    <p>Help a fellow student by sharing your notes or past papers.</p>

    {{if .Message}}
    <div class="alert">{{.Message}}</div>
    {{end}}

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <label>Resource Title *
            <input type="text" name="title" placeholder="e.g. Data Structures Full Notes" required>
        </label>

        <label>Course / Subject *
            <input type="text" name="course" placeholder="e.g. Computer Science" required>
        </label>

        <label>University *
            <input
                type="text"
                name="university"
                list="uni-suggestions"
                placeholder="Type your university name..."
                required
            >
            <datalist id="uni-suggestions">
                {{range .Universities}}
                <option value="{{.}}">
                {{end}}
            </datalist>
        </label>

        <label>Category *
            <select name="category" required>
                <option value="Notes">Notes</option>
                <option value="Past Paper">Past Paper</option>
                <option value="Textbook">Textbook</option>
                <option value="Summary">Summary Sheet</option>
                <option value="Video">Video</option>
                <option value="Other">Other</option>
            </select>
        </label>

        <label>Description
            <textarea name="description" rows="3" placeholder="Briefly describe what is in this resource..."></textarea>
        </label>

        <label>Your Name (optional)
            <input type="text" name="uploader" placeholder="e.g. Brian K.">
        </label>

        <label>Upload File *
            <input type="file" name="file" accept=".pdf,.mp4,.mkv,.webm" required>
            <small class="field-hint">Accepted formats: PDF, MP4, MKV, WEBM. Max size: 500MB.</small>
        </label>

        <button type="submit">📤 Share Resource</button>

    </form>
</section>

{{end}}
